server:
  port: 8081
spring:
  application:
    name: restaurant
  profiles:
    active: local  
  #Conexion a Base de Datos
  datasource:
    url: jdbc:mysql://localhost:3306/restaurant_db?useSSL=false&serverTimezone=UTC
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
