<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
    <head>
        <!-- Incluir fragmento head con título "Editar menu" -->
    <th:block th:replace="fragments/head :: head(title='Editar menu')"></th:block>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS específico para home -->
    <link rel="stylesheet" th:href="@{/css/home.css}">

    <link rel="stylesheet" th:href="@{/css/editar-menu.css}">
</head>
<body>
    <nav th:replace="fragments/navbar :: navbar"></nav>

    <div class="container mt-4">
        <h2>Reclamos y Quejas</h2>

        <table class="table table-bordered table-hover">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Tipo Reclamo</th>
                    <th>Detalle</th>
                    <th>Fecha Pedido</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="reclamo : ${reclamos}">
                    <td th:text="${reclamo.id}"></td>
                    <td th:text="${reclamo.nombreCompleto}"></td>
                    <td th:text="${reclamo.tipoReclamo}"></td>
                    <td th:text="${reclamo.detalleReclamo}"></td>
                    <td th:text="${reclamo.fechaPedido}"></td>
                    <td>
                        <!-- Botón para ver detalles -->
                        <a th:href="@{'/complaints/view/' + ${reclamo.id}}" class="btn btn-info btn-sm">Ver</a>
                    </td>
                </tr>
            </tbody>
        </table>

        <a th:href="@{/home}" class="btn btn-secondary">Volver</a>
    </div>
</body>
</html>
