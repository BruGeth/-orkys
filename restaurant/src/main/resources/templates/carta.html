<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <!-- Incluir fragmento head con título "Carta" -->
    <th:block th:replace="fragments/head :: head(title='Carta')"></th:block>
    <!-- CSS específico para esta página -->
    <link rel="stylesheet" th:href="@{/css/carta.css}">
</head>
<body>
<!-- Incluir fragmento navbar -->
<nav th:replace="fragments/navbar :: navbar"></nav>

<section class="hero">
    <h1>NUESTRA CARTA</h1>
    <p>Descubre los mejores sabores del pollo a la brasa peruano y platos tradicionales</p>
</section>

<div class="container">
    <div class="section-title">
        <h2>TODOS LOS PLATOS</h2>
    </div>

    <div class="search-bar">
        <input type="text" placeholder="Buscar por nombre, tipo o ingredientes...">
        <button>Buscar</button>
    </div>

    <div class="filters">
        <button class="filter-btn active">Todos</button>
        <button class="filter-btn">Pollos</button>
        <button class="filter-btn">Parrillas</button>
        <button class="filter-btn">Combos</button>
    </div>

    <div class="cards-grid">
        <div class="card-item" th:each="platillo : ${platillos}"
             th:data-rarity="${platillo.categoria.toLowerCase() == 'pollos' ? 'pollo' :
                                   platillo.categoria.toLowerCase() == 'parrillas' ? 'parrilla' :
                                   platillo.categoria.toLowerCase() == 'combos' ? 'combo' :
                                   platillo.categoria.toLowerCase()}">
            <div class="card-image">
                <img th:src="${platillo.urlImagen}" th:alt="${platillo.nombre}">
                <div class="rarity-tag rara" th:if="${platillo.categoria.toLowerCase() == 'parrillas' || platillo.categoria.toLowerCase() == 'parrilla'}">FAVORITO</div>
                <div class="rarity-tag legendaria" th:if="${platillo.categoria.toLowerCase() == 'combos' || platillo.categoria.toLowerCase() == 'combo'}">ESPECIAL</div>
            </div>
            <div class="card-info">
                <div class="card-name" th:text="${platillo.nombre}">Nombre del Plato</div>
                <div class="card-type" th:text="'Categoría: ' + ${platillo.categoria}">Categoría</div>
                <div class="card-description" th:text="${platillo.descripcion}">Descripción</div>
                <div class="card-stats" th:text="'S/. ' + ${#numbers.formatDecimal(platillo.precio, 1, 2)}">Precio</div>
                <div class="card-actions">
                    <a href="#" class="card-btn details-btn">VER DETALLES</a>
                    <a href="#" class="card-btn collection-btn">ORDENAR</a>
                </div>
            </div>
        </div>
    </div>
    <!-- Mensaje si no hay platillos -->
    <div class="no-results" th:if="${#lists.isEmpty(platillos)}" style="text-align: center; padding: 50px;">
        <h3>No hay platillos disponibles</h3>
        <p>Estamos trabajando en actualizar nuestro menú</p>
    </div>
</div>

<!-- Incluir fragmento footer -->
<footer th:replace="fragments/footer :: footer"></footer>

<!-- Incluir fragmento scripts -->
<th:block th:replace="fragments/head :: scripts"></th:block>

<!-- Script específico para esta página -->
<script th:src="@{/js/carta.js}"></script>

</body>
</html>
