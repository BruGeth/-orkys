<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <!-- Incluir fragmento head con título "Iniciar Sesión" -->
    <th:block th:replace="fragments/head :: head(title='Iniciar Sesión')"></th:block>
    <!-- CSS para autenticación -->
    <link rel="stylesheet" th:href="@{/css/auth-common.css}">
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
    <!-- Incluir fragmento navbar -->
    <nav th:replace="fragments/navbar :: navbar"></nav>
    
    <div class="form-container">
        <h3 class="text-center fw-bold mb-4 text-success">Iniciar Sesión</h3>

        <!-- Mensajes de alerta -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <form th:action="@{/login}" method="POST">
            <!-- Correo Electrónico -->
            <div class="mb-3">
                <label for="email" class="form-label">Correo Electrónico</label>
                <div class="input-group">
                    <span class="input-group-text bg-success text-white"><i class="bi bi-envelope"></i></span>
                    <input type="email" class="form-control" id="email" name="email" placeholder="correo@ejemplo.com" required>
                </div>
                <div class="invalid-feedback">Por favor, ingresa un correo válido.</div>
            </div>

            <!-- Contraseña -->
            <div class="mb-3">
                <label for="password" class="form-label">Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text bg-success text-white"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" id="password" name="password" placeholder="" required minlength="6">
                </div>
                <div class="invalid-feedback">La contraseña debe tener al menos 6 caracteres.</div>
            </div>

            <button type="submit" class="btn btn-success text-warning fw-bold w-100 mt-3">Ingresar</button>
        </form>

        <p class="text-center mt-3 mb-0">
            ¿No tienes una cuenta?
            <a th:href="@{/register}" class="text-success fw-semibold">Regístrate aquí</a>
        </p>
        
        <p class="text-center mt-2">
            <a th:href="@{/forgot-password}" class="text-muted">¿Olvidaste tu contraseña?</a>
        </p>
    </div>
    
    <!-- Incluir fragmento footer -->
    <footer th:replace="fragments/footer :: footer"></footer>
    
    <!-- Incluir fragmento scripts -->
    <th:block th:replace="fragments/head :: scripts"></th:block>
</body>
</html>
