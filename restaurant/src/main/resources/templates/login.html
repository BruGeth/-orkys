<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <!-- Incluir fragmento head con título "Iniciar Sesión" -->
    <th:block th:replace="~{fragments/head :: head(title='Iniciar Sesión')}"></th:block>
    <!-- CSS para autenticación -->
    <link rel="stylesheet" th:href="@{/css/auth-common.css}">
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
    <!-- Incluir fragmento navbar -->
    <nav th:replace="fragments/navbar :: navbar"></nav>
    
    <div class="form-container">
        <h3 class="text-center fw-bold mb-4 text-success">Iniciar Sesión</h3>

        <!-- Mensajes de alerta -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <form th:action="@{/auth/login}" method="POST" th:object="${loginRequest}">
            <!-- Username o Email -->
            <div class="mb-3">
                <label for="username" class="form-label">Usuario o Correo Electrónico</label>
                <div class="input-group">
                    <span class="input-group-text bg-success text-white"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" id="username" th:field="*{username}" placeholder="Usuario o correo" required>
                </div>
                <div class="text-danger" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
            </div>

            <!-- Contraseña -->
            <div class="mb-3">
                <label for="password" class="form-label">Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text bg-success text-white"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" id="password" th:field="*{password}" placeholder="" required minlength="6">
                </div>
                <div class="text-danger" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
            </div>
            
            <!-- Recordarme -->
            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="remember-me" th:field="*{rememberMe}">
                <label class="form-check-label" for="remember-me">Recordarme</label>
            </div>

            <button type="submit" class="btn btn-success w-100 mt-3">Ingresar</button>

            <p class="text-center mt-3 mb-0">
                <a th:href="@{/auth/forgot-password}" class="text-secondary fw-semibold">¿Olvidaste tu contraseña?</a>
            </p>
        </form>

        <p class="text-center mt-3 mb-0">
            ¿No tienes una cuenta?
            <a th:href="@{/auth/register}" class="text-success fw-semibold">Regístrate aquí</a>
        </p>
    </div>
    
    <!-- Incluir fragmento footer -->
    <footer th:replace="fragments/footer :: footer"></footer>
    
    <!-- Incluir fragmento scripts -->
    <th:block th:replace="fragments/head :: scripts"></th:block>
</body>
</html>
