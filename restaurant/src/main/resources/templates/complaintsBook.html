<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <th:block th:replace="fragments/head :: head(title='Libro de Reclamaciones')"></th:block>
    <link rel="stylesheet" th:href="@{/css/complaintsBook.css}">
</head>
<body>
    <nav th:replace="fragments/navbar :: navbar"></nav>

    <div class="container">
        <header>
            <h1>HOJA DE RECLAMACIÓN [N° 000001404-2025/LDRV-01]</h1>
            <p class="fecha">Fecha de registro: <span id="fecha-registro"></span></p>
        </header>

        <form th:action="@{/complaints/submit}" method="post">
            <!-- 1. Restaurante -->
            <section>
                <h2>1. Elección del restaurante</h2>
                <select name="restaurante" required>
                    <option value="">-- Seleccionar --</option>
                    <option value="Ñorkys San Isidro">Ñorkys San Isidro</option>
                    <option value="Ñorkys Miraflores">Ñorkys Miraflores</option>
                </select>
            </section>

            <!-- 2. Datos del consumidor -->
            <section>
                <h2>2. Datos del Consumidor</h2>
                <input type="text" name="nombreCompleto" placeholder="Nombre completo" required />
                <input type="text" name="departamento" placeholder="Departamento" required />
                <input type="text" name="direccion" placeholder="Dirección" required />
                <input type="text" name="documento" placeholder="Documento" required />
                <input type="text" name="telefono" placeholder="Teléfono" required />
                <input type="email" name="email" placeholder="Email" required />
                <input type="text" name="celular" placeholder="Celular" />
            </section>

            <!-- 3. Producto o servicio -->
            <section>
                <h2>3. Producto o Servicio</h2>
                <label><input type="radio" name="tipo" value="producto" required /> Producto</label>
                <label><input type="radio" name="tipo" value="servicio" /> Servicio</label>
                <input type="text" name="numeroPedido" placeholder="Número de pedido" />
                <input type="date" name="fechaPedido" />
                <select name="canalPedido">
                    <option value="">-- Canal de pedido --</option>
                    <option value="Delivery">Delivery</option>
                    <option value="Presencial">Presencial</option>
                </select>
                <input type="text" name="montoReclamado" placeholder="Monto reclamado" />
            </section>

            <!-- 4. Reclamo o queja -->
            <section>
                <h2>4. Reclamación o Queja</h2>
                <label><input type="radio" name="tipoReclamo" value="reclamo" required /> Reclamo</label>
                <label><input type="radio" name="tipoReclamo" value="queja" /> Queja</label>
                <textarea name="detalleReclamo" placeholder="Detalle del reclamo" required></textarea>
            </section>

            <!-- 5. Observaciones -->
            <section>
                <h2>5. Observaciones</h2>
                <input type="date" name="fechaObservacion" />
                <textarea name="observaciones" placeholder="Observaciones"></textarea>
            </section>

            <!-- Consentimiento -->
            <div class="consent">
                <label><input type="checkbox" name="consentimiento" required /> Acepto el uso de mis datos personales</label>
            </div>

            <div class="btn-container">
                <button type="submit">GUARDAR</button>
            </div>
        </form>

        <footer>
            <p>* La formulación del reclamo no impide acudir a otras vías de solución de controversias.</p>
        </footer>
    </div>

    <footer th:replace="fragments/footer :: footer"></footer>
    <script th:src="@{/js/reclamaciones.js}"></script>
</body>
</html>
