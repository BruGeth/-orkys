<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <th:block th:replace="~{fragments/head :: head(title='Verificar Código de Recuperación')}"></th:block>
    <link rel="stylesheet" th:href="@{/css/auth-common.css}">
    <link rel="stylesheet" th:href="@{/css/forgot-password.css}">
</head>
<body>
<nav th:replace="fragments/navbar :: navbar"></nav>
<div class="form-container">
    <h3 class="text-center fw-bold mb-4 text-success">Verifica tu código</h3>
    <form th:action="@{/auth/verify-reset-token}" method="POST">
        <input type="hidden" name="email" th:value="${email}">
        <div class="mb-3">
            <label for="resetToken" class="form-label">Código de 6 dígitos</label>
            <input type="text" class="form-control" id="resetToken" name="resetToken" maxlength="6" pattern="[0-9]{6}" placeholder="Ingresa el código" required>
        </div>
        <div class="mb-2 text-center">
            <span th:if="${resendAttempts != null}" th:text="'Intentos de reenvío: ' + ${resendAttempts} + ' / 3'" class="resend-attempts"></span>
        </div>
        <button type="submit" class="btn btn-success w-100 mt-3">Verificar código</button>
    </form>
    <form th:action="@{/auth/resend-reset-token}" method="POST" class="mt-3">
        <input type="hidden" name="email" th:value="${email}">
        <button type="submit" class="btn btn-outline-success w-100" th:disabled="${resendAttempts != null and resendAttempts >= 3}">Reenviar código</button>
    </form>
    <div th:if="${error}" class="alert alert-danger text-center resend-error mb-2" role="alert">
        <span th:text="${error}"></span>
    </div>
    <p class="text-center mt-3 mb-0">
        <a th:href="@{/auth/login}" class="text-success fw-semibold">Volver a iniciar sesión</a>
    </p>
</div>
<footer th:replace="fragments/footer :: footer"></footer>
<th:block th:replace="fragments/head :: scripts"></th:block>
</body>
</html>
