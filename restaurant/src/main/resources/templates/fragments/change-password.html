<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <th:block th:replace="~{fragments/head :: head(title='Cambiar Contraseña')}"></th:block>
    <link rel="stylesheet" th:href="@{/css/auth-common.css}">
    <link rel="stylesheet" th:href="@{/css/forgot-password.css}">
</head>
<body>
<nav th:replace="fragments/navbar :: navbar"></nav>
<div class="form-container">
    <h3 class="text-center fw-bold mb-4 text-success">Cambiar Contraseña</h3>
    <form th:action="@{/auth/change-password}" method="POST">
        <input type="hidden" name="email" th:value="${email}">
        <input type="hidden" name="resetToken" th:value="${resetToken}">
        <div class="mb-3">
            <label for="password" class="form-label">Nueva contraseña</label>
            <input type="password" class="form-control" id="password" name="password" minlength="6" required placeholder="Nueva contraseña">
        </div>
        <div class="mb-3">
            <label for="confirmPassword" class="form-label">Confirmar contraseña</label>
            <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" minlength="6" required placeholder="Repite la contraseña">
        </div>
        <button type="submit" class="btn btn-success w-100 mt-3">Cambiar contraseña</button>
    </form>
    <p class="text-center mt-3 mb-0">
        <a th:href="@{/auth/login}" class="text-success fw-semibold">Volver a iniciar sesión</a>
    </p>
</div>
<footer th:replace="fragments/footer :: footer"></footer>
<th:block th:replace="fragments/head :: scripts"></th:block>
</body>
</html>
