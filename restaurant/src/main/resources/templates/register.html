<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <!-- Incluir fragmento head con título "Registro" -->
    <th:block th:replace="fragments/head :: head(title='Registro')"></th:block>
    <!-- CSS para autenticación -->
    <link rel="stylesheet" th:href="@{/css/auth-common.css}">
    <link rel="stylesheet" th:href="@{/css/register.css}">
</head>
<body>
    <!-- Incluir fragmento navbar -->
    <nav th:replace="fragments/navbar :: navbar"></nav>
    
    <div class="form-container">
        <h3 class="text-center fw-bold mb-4 text-success">Registrarse</h3>
        
        <!-- Mensajes de alerta -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        
        <form th:action="@{/register}" th:object="${user}" method="post">
            <div class="mb-3">
                <label for="firstName" class="form-label">Nombre</label>
                <div class="input-group">
                    <span class="input-group-text bg-success text-white"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" id="firstName" th:field="*{firstName}" required />
                </div>
                <div class="text-danger" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></div>
            </div>

            <div class="mb-3">
                <label for="lastName" class="form-label">Apellido</label>
                <div class="input-group">
                    <span class="input-group-text bg-success text-white"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" id="lastName" th:field="*{lastName}" required />
                </div>
                <div class="text-danger" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></div>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">Correo Electrónico</label>
                <div class="input-group">
                    <span class="input-group-text bg-success text-white"><i class="bi bi-envelope"></i></span>
                    <input type="email" class="form-control" id="email" th:field="*{email}" required />
                </div>
                <div class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
            </div>

            <div class="mb-3">
                <label for="phone" class="form-label">Teléfono</label>
                <div class="input-group">
                    <span class="input-group-text bg-success text-white"><i class="bi bi-telephone"></i></span>
                    <input type="tel" class="form-control" id="phone" th:field="*{phone}" required />
                </div>
                <div class="text-danger" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>
            </div>

            <div class="mb-3">
                <label for="username" class="form-label">Usuario</label>
                <div class="input-group">
                    <span class="input-group-text bg-success text-white"><i class="bi bi-person-circle"></i></span>
                    <input type="text" class="form-control" id="username" th:field="*{username}" required />
                </div>
                <div class="text-danger" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text bg-success text-white"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" id="password" th:field="*{password}" required minlength="6" />
                </div>
                <div class="text-danger" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
            </div>

            <button type="submit" class="btn btn-success w-100 mt-3">Registrarse</button>
        </form>

        <p class="text-center mt-3">
            ¿Ya tienes una cuenta?
            <a th:href="@{/login}" class="text-success fw-semibold">Inicia sesión</a>
        </p>
    </div>
    
    <!-- Incluir fragmento footer -->
    <footer th:replace="fragments/footer :: footer"></footer>
    
    <!-- Incluir fragmento scripts -->
    <th:block th:replace="fragments/head :: scripts"></th:block>
</body>
</html>
