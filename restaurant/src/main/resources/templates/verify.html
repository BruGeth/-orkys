<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <th:block th:replace="fragments/head :: head(title='Verificar Cuenta')"></th:block>
    <link rel="stylesheet" th:href="@{/css/auth-common.css}">
    <link rel="stylesheet" th:href="@{/css/verify.css}">
</head>
<body>
<nav th:replace="fragments/navbar :: navbar"></nav>

<div class="form-container">
    <h3 class="text-center fw-bold mb-4 text-success">Verifica tu cuenta</h3>

    <!-- Mensajes de éxito o error -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <!-- Formulario para validar el token -->
    <form th:action="@{/auth/verify}" method="POST">
        <input type="hidden" name="email" th:value="${email}" />

        <div class="mb-3">
            <label for="token" class="form-label">Código de verificación</label>
            <div class="input-group">
                <span class="input-group-text bg-success text-white"><i class="bi bi-shield-check"></i></span>
                <input type="text" class="form-control" name="token" id="token" placeholder="Ingresa tu código" maxlength="6" required>
            </div>
        </div>

        <button type="submit" class="btn btn-success w-100 mt-3">Verificar código</button>
    </form>

    <!-- Sección de temporizador y reenvío -->
    <div class="text-center mt-4">
        <span id="timer" class="text-muted">Reenviar disponible en 30 segundos...</span>

        <form th:action="@{/auth/resend-token}" method="POST" class="d-inline">
            <input type="hidden" name="email" th:value="${email}" />
            <button type="submit" id="resendBtn" class="btn btn-outline-secondary mt-2" disabled>Reenviar código</button>
        </form>

        <!-- Intentos restantes (necesita que el controlador inyecte el objeto user) -->
        <p class="text-muted mt-2">
            Intentos restantes: <span th:text="${3 - user.resendAttempts}">3</span>
        </p>
    </div>
</div>

<footer th:replace="fragments/footer :: footer"></footer>
<th:block th:replace="fragments/head :: scripts"></th:block>

<!-- JS para temporizador -->
<script>
    window.addEventListener('load', function () {
        let seconds = 30;
        const timerSpan = document.getElementById('timer');
        const resendBtn = document.getElementById('resendBtn');

        if (!timerSpan || !resendBtn) {
            console.error(" Elementos #timer o #resendBtn no encontrados.");
            return;
        }

        timerSpan.textContent = `Reenviar disponible en ${seconds} segundos...`;

        const countdown = setInterval(() => {
            seconds--;
            timerSpan.textContent = `Reenviar disponible en ${seconds} segundos...`;

            if (seconds <= 0) {
                clearInterval(countdown);
                resendBtn.disabled = false;
                timerSpan.textContent = "¿No recibiste el código?";
            }
        }, 1000);
    });
</script>

 </div>

</body>
</html>
